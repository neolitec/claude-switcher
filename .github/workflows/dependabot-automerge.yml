name: Dependabot auto-merge

# Merges Dependabot PRs automatically once CI passes, by triggering on CI completion
# (workflow_run) and squash-merging when it succeeded.

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.actor.login == 'dependabot[bot]' &&
      startsWith(github.event.workflow_run.head_branch, 'dependabot/')
    steps:
      - name: Merge the Dependabot PR (squash)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          pr=$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$BRANCH" --state open --json number --jq '.[0].number')
          if [ -z "$pr" ]; then
            echo "No open PR for branch $BRANCH; nothing to merge."
            exit 0
          fi
          echo "Merging PR #$pr (CI passed)."
          gh pr merge "$pr" --repo "$GITHUB_REPOSITORY" --squash --delete-branch
