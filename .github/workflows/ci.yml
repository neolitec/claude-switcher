name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run compile
      - run: npm run lint
      # Knip v6 needs node:util styleText (Node 20.12+); the extension itself
      # still targets the Node 18 bundled by VS Code, so lint it on 20 only.
      - run: npm run knip
        if: matrix.node-version == '20.x'
      - run: npm run format:check
      - run: npm test
