name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # A PAT/App token is required here: PRs opened with the default GITHUB_TOKEN
          # don't trigger other workflows (CI, Commitlint), so the required status checks
          # on the release PR would never run and it could never satisfy branch protection.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
